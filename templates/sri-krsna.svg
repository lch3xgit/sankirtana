<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <!-- Sankirtana Template — Śrī Kṛṣṇa -->
  <!-- v0.3.0 — proportions tuned by hand -->

  <rect width="1000" height="1000" fill="{{bgColor}}"/>

  <!-- Outer circle -->
  <circle cx="500" cy="500" r="486" fill="{{circle1Color}}"/>

  <!-- Middle circle -->
  <circle cx="500" cy="500" r="397" fill="{{circle2Color}}"/>

  <!-- Inner circle -->
  <circle cx="500" cy="500" r="319" fill="{{circle3Color}}"/>

  <!-- Śrī -->
  <text x="500" y="370" text-anchor="middle" dominant-baseline="central"
        font-family="Hind, Noto Sans Devanagari, sans-serif" font-weight="700"
        font-size="170" fill="{{srColor}}" lang="sa">श्री</text>

  <!-- Kṛṣṇa -->
  <text x="500" y="570" text-anchor="middle" dominant-baseline="central"
        font-family="Hind, Noto Sans Devanagari, sans-serif" font-weight="700"
        font-size="270" fill="{{nameColor}}" lang="sa">कृष्ण</text>
</svg>
