<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <!-- Sankirtana Template — Śrī Kṛṣṇa -->
  <!-- Colors: background, circle1 (outer), circle2 (middle), circle3 (inner), srColor, nameColor -->

  <!-- Background -->
  <rect width="1000" height="1000" fill="{{background}}"/>

  <!-- Circle 1 (outer, largest) -->
  <circle cx="500" cy="500" r="450" fill="{{circle1}}"/>

  <!-- Circle 2 (middle) -->
  <circle cx="500" cy="500" r="320" fill="{{circle2}}"/>

  <!-- Circle 3 (inner, text background) -->
  <circle cx="500" cy="500" r="200" fill="{{circle3}}"/>

  <!-- śrī (above, smaller) -->
  <text x="500" y="415" text-anchor="middle" dominant-baseline="central"
        font-family="Hind, Noto Sans Devanagari, sans-serif"
        font-size="88" fill="{{srColor}}" font-weight="700">
    श्री
  </text>

  <!-- kṛṣṇa (below, larger) -->
  <text x="500" y="560" text-anchor="middle" dominant-baseline="central"
        font-family="Hind, Noto Sans Devanagari, sans-serif"
        font-size="170" fill="{{nameColor}}" font-weight="700">
    कृष्ण
  </text>

</svg>
